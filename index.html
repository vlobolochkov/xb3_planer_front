<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Привычки</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --accent: #4f8ef7;
      --accent-light: #e8f0fe;
      --accent-dark: #2563eb;
      --bg: #f5f6fa;
      --card: #ffffff;
      --text: #1a1a2e;
      --muted: #7b8497;
      --border: #e2e5ef;
      --success: #22c55e;
      --danger: #ef4444;
      --streak: #f59e0b;
      --streak-light: #fef3c7;
      --radius: 16px;
      --radius-sm: 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1117;
        --card: #1c1f2e;
        --text: #e8eaf6;
        --muted: #6b7280;
        --border: #2d3148;
        --accent-light: #1e2a4a;
        --streak-light: #2d2008;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 90px;
    }

    /* Loading screen */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 999;
      transition: opacity 0.3s;
    }

    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-size: 14px;
      color: var(--muted);
    }

    /* Error banner */
    .error-banner {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin: 12px 16px;
      font-size: 13px;
      color: var(--danger);
      text-align: center;
    }

    .error-banner.visible {
      display: block;
    }

    /* Sync indicator */
    .sync-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
      margin-left: 6px;
      vertical-align: middle;
      transition: background 0.3s;
    }

    .sync-dot.syncing {
      background: var(--streak);
      animation: pulse 1s infinite;
    }

    .sync-dot.error {
      background: var(--danger);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.4
      }
    }

    /* Header */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .app-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .date-badge {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }

    .progress-bar-wrap {
      background: var(--border);
      border-radius: 99px;
      height: 4px;
      margin-top: 10px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-dark));
      border-radius: 99px;
      transition: width 0.4s;
    }

    .progress-text {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
      text-align: right;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 6px;
      padding: 12px 20px;
      background: var(--bg);
    }

    .tab-btn {
      flex: 1;
      padding: 8px 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: var(--card);
      color: var(--muted);
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(79, 142, 247, .3);
    }

    .content {
      padding: 0 16px;
    }

    /* Habit card */
    .habit-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 10px;
      overflow: hidden;
      animation: slideIn 0.22s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .habit-main {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
    }

    .habit-emoji {
      font-size: 26px;
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: var(--accent-light);
      flex-shrink: 0;
    }

    .habit-info {
      flex: 1;
      min-width: 0;
    }

    .habit-name {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .habit-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 3px;
    }

    .streak-badge {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      font-weight: 600;
      color: var(--streak);
      background: var(--streak-light);
      padding: 2px 7px;
      border-radius: 99px;
    }

    .days-label {
      font-size: 12px;
      color: var(--muted);
    }

    .check-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      font-size: 18px;
      color: #fff;
    }

    .check-btn.done {
      background: var(--success);
      border-color: var(--success);
      animation: pop 0.22s ease;
    }

    @keyframes pop {
      0% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.25)
      }

      100% {
        transform: scale(1)
      }
    }

    /* Week calendar */
    .week-strip {
      display: flex;
      padding: 0 14px 12px;
      gap: 3px;
    }

    .wday {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .wday-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--muted);
    }

    .wday-cell {
      width: 100%;
      height: 20px;
      border-radius: 5px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .wday-cell.done {
      background: var(--success);
    }

    .wday-cell.today-empty {
      background: var(--accent-light);
      border: 1.5px dashed var(--accent);
    }

    .wday-cell.today-done {
      background: var(--success);
      border: 2px solid var(--accent-dark);
    }

    .wday-cell.done::after,
    .wday-cell.today-done::after {
      content: '✓';
      color: #fff;
      font-size: 9px;
      font-weight: 800;
    }

    /* Delete row */
    .delete-row {
      border-top: 1px solid var(--border);
    }

    .delete-initial {
      display: flex;
      justify-content: flex-end;
    }

    .btn-del-trigger {
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 500;
      color: var(--danger);
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .delete-confirm {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      gap: 10px;
      animation: slideIn 0.15s ease;
      background: #fff0f0;
    }

    @media (prefers-color-scheme: dark) {
      .delete-confirm {
        background: #2a1515;
      }
    }

    .delete-confirm.visible {
      display: flex;
    }

    .del-confirm-text {
      font-size: 13px;
      color: var(--danger);
      font-weight: 500;
    }

    .del-btns {
      display: flex;
      gap: 8px;
    }

    .del-yes {
      padding: 6px 14px;
      border-radius: 8px;
      background: var(--danger);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .del-no {
      padding: 6px 14px;
      border-radius: 8px;
      background: var(--border);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      font-weight: 600;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      margin-top: 4px;
      line-height: 1;
    }

    .stat-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .habit-stat-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hsrow-emoji {
      font-size: 22px;
    }

    .hsrow-info {
      flex: 1;
    }

    .hsrow-name {
      font-size: 14px;
      font-weight: 600;
    }

    .hsrow-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .hsrow-bar-wrap {
      width: 80px;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 4px;
    }

    .hsrow-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-dark));
      border-radius: 99px;
    }

    .hsrow-pct {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      min-width: 36px;
      text-align: right;
    }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      font-size: 28px;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(79, 142, 247, .4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
      z-index: 200;
    }

    .fab:active {
      transform: scale(0.92);
    }

    /* Modal */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--card);
      border-radius: 24px 24px 0 0;
      width: 100%;
      padding: 20px 20px 40px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(.4, 0, .2, 1);
    }

    .overlay.open .modal {
      transform: none;
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin: 0 auto 20px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .input-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 6px;
    }

    .text-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
      font-family: inherit;
    }

    .text-input:focus {
      border-color: var(--accent);
    }

    .emoji-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 18px;
    }

    .emoji-pick {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: var(--bg);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .emoji-pick:active {
      transform: scale(0.9);
    }

    .emoji-pick.selected {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .save-btn {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius);
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s;
      font-family: inherit;
    }

    .save-btn:active {
      transform: scale(0.98);
    }

    /* Misc */
    .empty {
      text-align: center;
      padding: 48px 20px;
    }

    .empty-icon {
      font-size: 52px;
      margin-bottom: 12px;
    }

    .empty-text {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .empty-sub {
      font-size: 14px;
      color: var(--muted);
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      font-weight: 700;
      margin: 14px 0 8px;
    }
  </style>
</head>

<body>

  <!-- Экран загрузки -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Загрузка данных…</div>
  </div>

  <div class="header">
    <div class="header-top">
      <div class="app-title">✦ Привычки <span class="sync-dot" id="syncDot"></span></div>
      <div class="date-badge" id="dateBadge"></div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progressText">0 из 0 выполнено</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-today" onclick="switchTab('today')">Сегодня</button>
    <button class="tab-btn" id="tab-stats" onclick="switchTab('stats')">Статистика</button>
  </div>

  <div class="error-banner" id="errorBanner">Ошибка синхронизации. Проверьте соединение.</div>
  <div class="content" id="mainContent"></div>

  <button class="fab" id="fabBtn" onclick="openModal()">+</button>

  <div class="overlay" id="overlay" onclick="closeModalOnBg(event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Новая привычка</div>
      <div class="input-label">Название</div>
      <input class="text-input" id="habitName" type="text" placeholder="Например, Читать книгу" maxlength="40">
      <div class="input-label">Иконка</div>
      <div class="emoji-grid" id="emojiGrid"></div>
      <button class="save-btn" onclick="saveHabit()">Добавить привычку</button>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════════
    // КОНФИГ — замените на ваш URL после деплоя
    // ════════════════════════════════════════════
    const API_URL = "https://xb3planer-production.up.railway.app"

    // ────────────────────────────────────────────
    // Telegram WebApp
    // ────────────────────────────────────────────
    const tg = window.Telegram?.WebApp
    if (tg) { tg.ready(); tg.expand() }

    // initData — строка для авторизации на бэкенде
    // В реальном Telegram она заполняется автоматически.
    // Для локального тестирования подставьте тестовую строку.
    const INIT_DATA = tg?.initData || ""

    // ────────────────────────────────────────────
    // Состояние
    // ────────────────────────────────────────────
    const EMOJIS = ['📚', '🏃', '💧', '🧘', '🎯', '💪', '🥗', '😴', '✍️', '🎨', '🎸', '🧹', '💊', '🌿', '🐕', '🚴', '🧠', '🌅', '🫁', '🏊']
    let state = { habits: [], completions: {} }
    let saveTimer = null   // дебаунс — не шлём запрос на каждый тап

    // ────────────────────────────────────────────
    // API
    // ────────────────────────────────────────────
    function setSyncState(s) {
      // s: 'ok' | 'syncing' | 'error'
      const dot = document.getElementById('syncDot')
      dot.className = 'sync-dot' + (s === 'syncing' ? ' syncing' : s === 'error' ? ' error' : '')
      document.getElementById('errorBanner').classList.toggle('visible', s === 'error')
    }

    async function loadFromServer() {
      if (!INIT_DATA) {
        // Открыто не в Telegram (браузер/превью) — работаем без сервера
        console.warn("initData пустой — режим превью без сервера")
        hideLoading()
        render()
        return
      }
      try {
        setSyncState('syncing')
        const res = await fetch(`${API_URL}/load`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ init_data: INIT_DATA })
        })
        if (!res.ok) throw new Error(res.status)
        const json = await res.json()
        state = json.data || { habits: [], completions: {} }
        setSyncState('ok')
      } catch (e) {
        console.error("load error", e)
        setSyncState('error')
      } finally {
        hideLoading()
        render()
      }
    }

    async function saveToServer() {
      if (!INIT_DATA) return   // превью-режим
      try {
        setSyncState('syncing')
        const res = await fetch(`${API_URL}/save`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ init_data: INIT_DATA, data: state })
        })
        if (!res.ok) throw new Error(res.status)
        setSyncState('ok')
      } catch (e) {
        console.error("save error", e)
        setSyncState('error')
      }
    }

    // Дебаунс: сохраняем через 800 мс после последнего изменения
    function scheduleSave() {
      clearTimeout(saveTimer)
      saveTimer = setTimeout(saveToServer, 800)
    }

    // ────────────────────────────────────────────
    // Загрузочный экран
    // ────────────────────────────────────────────
    function hideLoading() {
      const s = document.getElementById('loadingScreen')
      s.classList.add('hidden')
      setTimeout(() => s.style.display = 'none', 350)
    }

    // ────────────────────────────────────────────
    // Дата
    // ────────────────────────────────────────────
    function todayKey() { return dateKey(0) }
    function dateKey(offset) {
      const d = new Date(); d.setDate(d.getDate() + offset)
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`
    }
    function isComplete(hid, day) { return !!(state.completions[day]?.[hid]) }

    // ────────────────────────────────────────────
    // Действия
    // ────────────────────────────────────────────
    function toggleToday(hid) {
      const today = todayKey()
      if (!state.completions[today]) state.completions[today] = {}
      const was = state.completions[today][hid]
      state.completions[today][hid] = !was
      scheduleSave()
      render()
      if (!was && tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light')
    }

    function askDelete(hid) {
      document.querySelectorAll('.delete-confirm.visible').forEach(el => {
        if (el.dataset.hid !== hid) el.classList.remove('visible')
      })
      document.querySelector(`.delete-confirm[data-hid="${hid}"]`)?.classList.toggle('visible')
    }
    function cancelDelete(hid) {
      document.querySelector(`.delete-confirm[data-hid="${hid}"]`)?.classList.remove('visible')
    }
    function confirmDelete(hid) {
      state.habits = state.habits.filter(h => h.id !== hid)
      scheduleSave()
      render()
      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning')
    }

    // ────────────────────────────────────────────
    // Статистика
    // ────────────────────────────────────────────
    function getStreak(hid) {
      let streak = 0, i = 0
      while (true) {
        const day = dateKey(-i)
        if (i === 0 && !isComplete(hid, day)) break
        if (!isComplete(hid, day)) break
        streak++; i++
      }
      return streak
    }
    function getTotalDays(hid) { return Object.values(state.completions).filter(d => d[hid]).length }
    function getCompletionRate(hid) {
      const h = state.habits.find(h => h.id === hid); if (!h) return 0
      const days = Math.max(1, Math.ceil((new Date() - new Date(h.createdAt)) / 86400000) + 1)
      return Math.round(getTotalDays(hid) / days * 100)
    }

    // ────────────────────────────────────────────
    // Таб
    // ────────────────────────────────────────────
    let currentTab = 'today', selectedEmoji = EMOJIS[0]

    function switchTab(tab) {
      currentTab = tab
      document.getElementById('tab-today').classList.toggle('active', tab === 'today')
      document.getElementById('tab-stats').classList.toggle('active', tab === 'stats')
      document.getElementById('fabBtn').style.display = tab === 'today' ? 'flex' : 'none'
      render()
    }

    // ────────────────────────────────────────────
    // Рендер
    // ────────────────────────────────────────────
    function render() { updateHeader(); currentTab === 'today' ? renderToday() : renderStats() }

    function updateHeader() {
      const names = ['вс', 'пн', 'вт', 'ср', 'чт', 'пт', 'сб']
      const months = ['янв', 'фев', 'мар', 'апр', 'май', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек']
      const d = new Date()
      document.getElementById('dateBadge').textContent = `${names[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]}`
      const total = state.habits.length
      const done = state.habits.filter(h => isComplete(h.id, todayKey())).length
      const pct = total ? Math.round(done / total * 100) : 0
      document.getElementById('progressFill').style.width = pct + '%'
      document.getElementById('progressText').textContent = `${done} из ${total} выполнено`
    }

    function renderToday() {
      const c = document.getElementById('mainContent')
      if (!state.habits.length) {
        c.innerHTML = `<div class="empty"><div class="empty-icon">🌱</div><div class="empty-text">Нет привычек</div><div class="empty-sub">Нажмите + чтобы добавить первую привычку</div></div>`
        return
      }
      const today = todayKey()
      const pending = state.habits.filter(h => !isComplete(h.id, today))
      const done = state.habits.filter(h => isComplete(h.id, today))
      let html = ''
      if (pending.length) { html += `<div class="section-label">Осталось ${pending.length}</div>` + pending.map(habitCard).join('') }
      if (done.length) { html += `<div class="section-label">Выполнено ✓</div>` + done.map(habitCard).join('') }
      c.innerHTML = html
    }

    const DAY_SHORT = ['вс', 'пн', 'вт', 'ср', 'чт', 'пт', 'сб']

    function habitCard(h) {
      const today = todayKey()
      const doneToday = isComplete(h.id, today)
      const streak = getStreak(h.id)
      const total = getTotalDays(h.id)
      let strip = ''
      for (let i = 6; i >= 0; i--) {
        const day = dateKey(-i)
        const d = new Date(); d.setDate(d.getDate() - i)
        const lbl = DAY_SHORT[d.getDay()]
        const isToday = i === 0
        const done = isComplete(h.id, day)
        const cls = isToday ? (done ? 'today-done' : 'today-empty') : (done ? 'done' : '')
        strip += `<div class="wday"><div class="wday-label">${lbl}</div><div class="wday-cell ${cls}"></div></div>`
      }
      return `<div class="habit-card">
    <div class="habit-main">
      <div class="habit-emoji">${h.emoji}</div>
      <div class="habit-info">
        <div class="habit-name">${escHtml(h.name)}</div>
        <div class="habit-meta">
          ${streak > 0 ? `<div class="streak-badge">🔥 ${streak}</div>` : ''}
          <div class="days-label">${total} ${pluralDays(total)} всего</div>
        </div>
      </div>
      <button class="check-btn ${doneToday ? 'done' : ''}" onclick="toggleToday('${h.id}')">
        ${doneToday ? '✓' : ''}
      </button>
    </div>
    <div class="week-strip">${strip}</div>
    <div class="delete-row">
      <div class="delete-initial"><button class="btn-del-trigger" onclick="askDelete('${h.id}')">🗑 Удалить</button></div>
      <div class="delete-confirm" data-hid="${h.id}">
        <div class="del-confirm-text">Удалить привычку?</div>
        <div class="del-btns">
          <button class="del-no"  onclick="cancelDelete('${h.id}')">Нет</button>
          <button class="del-yes" onclick="confirmDelete('${h.id}')">Удалить</button>
        </div>
      </div>
    </div>
  </div>`
    }

    function renderStats() {
      const c = document.getElementById('mainContent')
      if (!state.habits.length) {
        c.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Нет данных</div><div class="empty-sub">Добавьте привычки во вкладке «Сегодня»</div></div>`
        return
      }
      const today = todayKey()
      const todayDone = state.habits.filter(h => isComplete(h.id, today)).length
      const best = Math.max(...state.habits.map(h => getStreak(h.id)), 0)
      const allTime = Object.values(state.completions).reduce((s, d) => s + Object.values(d).filter(Boolean).length, 0)
      let html = `<div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Сегодня</div><div class="stat-value">${todayDone}/${state.habits.length}</div><div class="stat-sub">привычек</div></div>
    <div class="stat-card"><div class="stat-label">Лучшая серия</div><div class="stat-value">🔥${best}</div><div class="stat-sub">${pluralDays(best)} подряд</div></div>
    <div class="stat-card"><div class="stat-label">Всего выполнено</div><div class="stat-value">${allTime}</div><div class="stat-sub">раз</div></div>
    <div class="stat-card"><div class="stat-label">Привычек</div><div class="stat-value">${state.habits.length}</div><div class="stat-sub">активных</div></div>
  </div><div class="section-label">Прогресс по привычкам</div>`
      html += [...state.habits].sort((a, b) => getCompletionRate(b.id) - getCompletionRate(a.id)).map(h => {
        const pct = getCompletionRate(h.id)
        return `<div class="habit-stat-row">
      <div class="hsrow-emoji">${h.emoji}</div>
      <div class="hsrow-info">
        <div class="hsrow-name">${escHtml(h.name)}</div>
        <div class="hsrow-sub">🔥${getStreak(h.id)} серия · ${getTotalDays(h.id)} ${pluralDays(getTotalDays(h.id))}</div>
        <div class="hsrow-bar-wrap"><div class="hsrow-bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="hsrow-pct">${pct}%</div>
    </div>`
      }).join('')
      c.innerHTML = html
    }

    // ────────────────────────────────────────────
    // Модал
    // ────────────────────────────────────────────
    function openModal() {
      selectedEmoji = EMOJIS[0]
      document.getElementById('habitName').value = ''
      buildEmojiGrid()
      document.getElementById('overlay').classList.add('open')
      setTimeout(() => document.getElementById('habitName').focus(), 350)
    }
    function closeModal() { document.getElementById('overlay').classList.remove('open') }
    function closeModalOnBg(e) { if (e.target === document.getElementById('overlay')) closeModal() }
    function buildEmojiGrid() {
      document.getElementById('emojiGrid').innerHTML = EMOJIS.map(em =>
        `<div class="emoji-pick ${em === selectedEmoji ? 'selected' : ''}" onclick="selectEmoji('${em}')">${em}</div>`
      ).join('')
    }
    function selectEmoji(em) { selectedEmoji = em; buildEmojiGrid() }

    function saveHabit() {
      const name = document.getElementById('habitName').value.trim()
      if (!name) { document.getElementById('habitName').focus(); return }
      state.habits.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), name, emoji: selectedEmoji, createdAt: new Date().toISOString() })
      scheduleSave()
      closeModal()
      render()
      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success')
    }

    // ────────────────────────────────────────────
    // Утилиты
    // ────────────────────────────────────────────
    function escHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') }
    function pluralDays(n) {
      if (n % 100 >= 11 && n % 100 <= 14) return 'дней'
      const r = n % 10; return r === 1 ? 'день' : r >= 2 && r <= 4 ? 'дня' : 'дней'
    }

    // ────────────────────────────────────────────
    // Старт
    // ────────────────────────────────────────────
    updateHeader()   // дату показываем сразу
    loadFromServer() // загружаем данные, потом рендерим

    document.getElementById('habitName').addEventListener('keydown', e => { if (e.key === 'Enter') saveHabit() });
  </script>
</body>

</html>
